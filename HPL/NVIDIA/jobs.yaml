# Uncomment if you want the jobs to be run one at the time
# sequential: true

variables:
  nodes: [1] #, 2, 4, 8]
  p2p: ["nvshmem"] # ["mpi-cuda-aware", "nccl-sndrcv"]
  mem_per_node: [1.0] # In GB. This will define the problem size

preprocess: "echo $CUDA_VISIBLE_DEVICES; nvidia-smi; ../gen_dat_file.sh -o HPL_{nodes}_nodes.dat -m {mem_per_node} {nodes} $(({nodes}*4))"
command: "srun --mpi=pmix --gpus-per-task=1 ./nvidia_bench/hpl.sh --dat -o HPL_{nodes}_nodes.dat"

jobs:
  - config: "{nodes}_nodes__{p2p}"
    config_jobs:
      - tag: "NVIDIA_HPL__{p2p}"
