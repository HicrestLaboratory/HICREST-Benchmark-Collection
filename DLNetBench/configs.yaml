variables:
  nodes: [2, 4, 6, 8, 10, 12, 14, 16, 18, 32, 56, 64, 128, 256] # , 512, 1024]
  gpus: [2, 4, 8]

isarco:
  scheduler: local

  default_conf:
    time: "00:03:00"
    modules: 
      - "nvhpc-hpcx-cuda13/26.1"

  configs:
    - name: "gpus_{gpus}"

nvl72:
  scheduler: slurm

  default_conf:
    # Change me as needed
    partition: "gamoraq"
    time: "00:03:00"
    # gpus: 4
    # qos: "?"
    cpus_per_task: 8
    exclusive: true
    custom_headers:
      - "#SBATCH --ntasks-per-node=4"

    # SPECIFY IF NEEDED
    # modules: 
    #   - ""

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"
      
    - name: "{nodes}_nodes_no_mnnvl"
      nodes: "{nodes}"
      env:
        - "NCCL_MNNVL_ENABLE=0"

baldo:
  scheduler: slurm

  default_conf:
    time: "00:15:00"
    account: "flavio.vella"
    partition: "short"
    qos: "normal"
    nodes: 1
    ntasks: 8
    nodelist: ["gpu01"]
    reservation: "gpu_vella"
    modules: 
      - "hpcx-ompi"
      - "NVHPC/nvhpc-hpcx-cuda12/24.7"
    custom_headers:
      - "#SBATCH --cpus-per-task=4"

  configs:
    - name: "{gpus}_gpus"
      gpus: "{gpus}"

      
leonardo:
  scheduler: slurm

  default_conf:
    account: "IscrC_OMG-25"
    cpus_per_task: 8
    gpus: 4
    time: "00:05:00"
    partition: "boost_usr_prod"
    # boost_qos_bprod
    qos: "normal" 
    exclusive: true
    custom_headers:
      - "#SBATCH --ntasks-per-node=4"
    modules: 
      - "gcc/12.2.0"
      - "openmpi/4.1.6--gcc--12.2.0-cuda-12.2"
      - "nvhpc/24.5"

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"
      env:
        - "NCCL_IB_SL=1"
        - "UCX_IB_SL=1"


alps:
  scheduler: slurm

  default_conf:
    account: "lp100"
    cpus_per_task: 72
    time: "00:05:00"
    partition: "normal"
    gpus: 4
    exclusive: true
    modules:
      - "gcc/14.3.0"
      - "cuda/12.9.1"
      - "nccl/2.28.9-1"
      - "openmpi/5.0.9"
      - "libfabric/2.3.1"
      - "aws-ofi-nccl/1.17.1"
    custom_headers:
      - "#SBATCH --uenv=prgenv-gnu-openmpi/25.12:v1"
      - "#SBATCH --view=modules"
      - "#SBATCH --ntasks-per-node=4"
    env:
      - "NCCL_NCHANNELS_PER_NET_PEER=4"
      - "NCCL_NET=\"AWS Libfabric\""
      - "NCCL_NET_GDR_LEVEL=PHB"
      - "NCCL_CROSS_NIC=1"
      - "NCCL_PROTO=^LL128"
      - "PMIX_MCA_psec=^munge"

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"


jupiter:
  scheduler: slurm

  default_conf:
    account: "exalab"
    cpus_per_task: 72
    gpus: 4
    exclusive: true
    time: "00:05:00"
    partition: "booster"
    modules:
      - "CUDA/13"
      - "nvidia-compilers/25.9-CUDA-13"
      - "NCCL/default-CUDA-13"
      - "OpenMPI/5.0.8"
    custom_headers:
      - "#SBATCH --ntasks-per-node=4"

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"
