variables:
  nodes: [2, 4, 8, 16, 32, 64] # , 128, 256, 512, 1024]
  gpus: [2, 4]

isarco:
  scheduler: local

  default_conf:
    modules: 
      - "nvhpc-hpcx-cuda13/26.1"

  configs:
    - name: "gpus_{gpus}"


leonardo:
  scheduler: slurm

  default_conf:
    account: "IscrC_OMG-25"
    cpus_per_task: 8
    gpus: 4
    time: "00:05:00"
    partition: "boost_usr_prod"
    qos: "normal"
    modules: 
      - "gcc/12.2.0"
      - "openmpi/4.1.6--gcc--12.2.0-cuda-12.2"
      - "nvhpc/24.5"

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"
      custom_headers:
        - "#SBATCH --ntasks-per-node=4"
      env:
        - "NCCL_IB_SL=1"
        - "UCX_IB_SL=1"
