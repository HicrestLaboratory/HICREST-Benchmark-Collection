variables:
  nodes: [2, 4, 6, 8, 10, 12, 14, 16, 18, 32, 56, 64, 128, 256] # , 512, 1024]
  gpus: [2, 4, 8]

isarco:
  scheduler: local

  default_conf:
    time: "00:03:00"
    modules: 
      - "nvhpc-hpcx-cuda13/26.1"

  configs:
    - name: "gpus_{gpus}"

nvl72:
  scheduler: slurm

  default_conf:
    # Change me as needed
    partition: "gamoraq"
    time: "00:03:00"
    # gpus: 4
    # qos: "?"
    exclusive: true
    custom_headers:
      - "#SBATCH --ntasks-per-node=4"

    # SPECIFY IF NEEDED
    # modules: 
    #   - ""

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"
      
    - name: "{nodes}_nodes_no_mnnvl"
      nodes: "{nodes}"
      env:
        - "NCCL_MNNVL_ENABLE=0"

baldo:
  scheduler: slurm

  default_conf:
    time: "00:15:00"
    account: "flavio.vella"
    partition: "short"
    qos: "normal"
    nodes: 1
    ntasks: 8
    nodelist: ["gpu01"]
    reservation: "gpu_vella"
    modules: 
      - "hpcx-ompi"
      - "NVHPC/nvhpc-hpcx-cuda12/24.7"
    custom_headers:
      - "#SBATCH --cpus-per-task=4"

  configs:
    - name: "{gpus}_gpus"
      gpus: "{gpus}"

      
leonardo:
  scheduler: slurm

  default_conf:
    account: "IscrC_OMG-25"
    cpus_per_task: 8
    gpus: 4
    time: "00:03:00"
    partition: "boost_usr_prod"
    # boost_qos_bprod
    qos: "normal" 
    exclusive: true
    custom_headers:
      - "#SBATCH --ntasks-per-node=4"
    modules: 
      - "gcc/12.2.0"
      - "openmpi/4.1.6--gcc--12.2.0-cuda-12.2"
      - "nvhpc/24.5"

  configs:
    - name: "{nodes}_nodes"
      nodes: "{nodes}"
      env:
        - "NCCL_IB_SL=1"
        - "UCX_IB_SL=1"
