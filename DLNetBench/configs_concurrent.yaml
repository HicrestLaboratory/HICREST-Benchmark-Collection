variables:
  nodes: [2, 4, 8, 16, 32, 64] # , 128, 256, 512, 1024]
  gpus: [2, 4]

isarco:
  scheduler: local

  default_conf:
    time: "00:30:00"
    modules: 
      - "nvhpc-hpcx-cuda13/26.1"

  configs:
    - name: "gpus_{gpus}"

nvl72:
  scheduler: slurm

  default_conf:
    partition: "gamoraq"
    time: "00:30:00"
    # This converts to gres=gpu:4
    gpus: 4

    # SPECIFY IF NEEDED
    # modules: 
    #   - ""
    # custom_headers:
    # - "#SBATCH --ntasks-per-node=?"

  configs:
    - name: "gpus_8"
      nodes: 2
      # FIX if needed
      ntasks: 1
    
    - name: "gpus_16"
      nodes: 4
      # FIX if needed
      ntasks: 1

