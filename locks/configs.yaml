variables:
  pioneer_ncpus: [64]
  # bananaf3_ncpus: [8]
  # arriesgado_ncpus: [4]

hca:
  scheduler: slurm

  default_conf:
    nodes: 1
    ntasks: 1
    exclusive: true
    time: "04:00:00"

  configs:
    - name: "pioneer_{pioneer_ncpus}cpus"
      partition: "pioneer"
      cpus_per_task: "{pioneer_ncpus}"

    # - name: "bananaf3_{bananaf3_ncpus}cpus"
    #   partition: "bananaf3-k6.6"
    #   cpus_per_task: "{bananaf3_ncpus}"

    # - name: "arriesgado_{arriesgado_ncpus}cpus"
    #   partition: "arriesgado-jammy"
    #   cpus_per_task: "{arriesgado_ncpus}"


leonardo:
  scheduler: slurm

  default_conf:
    account: "IscrC_OMG-25_0"
    cpus_per_task: 112
    time: "02:30:00"
    partition: "dcgp_usr_prod"
    qos: "normal"
    exclusive: true
    nodes: 1
    ntasks: 1
    modules: 
      - "gcc/12.2.0"
    custom_headers:
      - "#SBATCH --gres=gres/tmpfs:10g"

  configs:
    - name: "leonardo-dcgp_112cpus"

    - name: "leonardo-dcgp_112cpus_perf"
      env:
        - "LOCKS_ENABLE_PERF=1"


thea:
  scheduler: slurm

  default_conf:
    time: "02:30:00"
    partition: "gg"
    nodes: 1
    ntasks: 1
    exclusive: true
    cpus_per_task: 144
    modules:
      - "gcc/14.3.0"

  configs:

    - name: "thea-gg_144cpus"

    - name: "thea-gg_144cpus_perf"
      env:
        - "LOCKS_ENABLE_PERF=1"