variables:
  pioneer_ncpus: [64]
  # bananaf3_ncpus: [8]
  # arriesgado_ncpus: [4]

hca:
  scheduler: slurm

  default_conf:
    nodes: 1
    ntasks: 1
    exclusive: true
    time: "04:00:00"

  configs:
    - name: "pioneer_{pioneer_ncpus}cpus"
      partition: "pioneer"
      cpus_per_task: "{pioneer_ncpus}"

