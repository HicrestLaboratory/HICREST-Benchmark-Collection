variables:
  pioneer_ncpus: [1, 2, 4, 8, 16, 32, 64]
  bananaf3_ncpus: [1, 2, 4, 8]
  arriesgado_ncpus: [1, 2, 4]

  array_bench_sizes: [1, 243, 2187, 19683, 59049]

  benchmark:
    - "syncbench"
    - "schedbench"
    - "taskbench"


jobs:
  - config: "pioneer_{pioneer_ncpus}cpus"
    command: "./{benchmark}"
    config_jobs:
      - tag: "{benchmark}_{pioneer_ncpus}cpus"

      - tag: "arraybench_{array_bench_sizes}_{pioneer_ncpus}cpus"
        command: "./arraybench_{array_bench_sizes}"
  - config: "arriesgado_{arriesgado_ncpus}cpus"
    command: "./{benchmark}"
    config_jobs:
      - tag: "{benchmark}_{arriesgado_ncpus}cpus"
      - tag: "arraybench_{array_bench_sizes}_{arriesgado_ncpus}cpus"
        command: "./arraybench_{array_bench_sizes}"
  - config: "bananaf3_{bananaf3_ncpus}cpus"
    command: "./{benchmark}"
    config_jobs:
      - tag: "{benchmark}_{bananaf3_ncpus}cpus"
      - tag: "arraybench_{array_bench_sizes}_{bananaf3_ncpus}cpus"
        command: "./arraybench_{array_bench_sizes}"