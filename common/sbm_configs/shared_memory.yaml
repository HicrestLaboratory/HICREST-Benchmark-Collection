thea:
  scheduler: slurm

  default_conf:
    time: "01:00:00"
    partition: "gg"
    nodes: 1
    ntasks: 1
    exclusive: true
    env: 
      - "OMP_PROC_BIND=close"
      - "OMP_PLACES=cores"

  configs:
    - name: "gg__gcc__nvpl__{ncpus}"
      cpus_per_task: "{ncpus}"
      modules:
        - "gcc/14.3.0"
        - "nvpl/25.5"
      env: 
        - "OMP_NUM_THREADS={ncpus}"
        - "OPENBLAS_NUM_THREADS={ncpus}"
        - "GOTO_NUM_THREADS={ncpus}"

    # TODO openblas

    # - name: "gg__clang__{ncpus}"
    #   cpus_per_task: "{ncpus}"
    #   modules:
    #     - "WIP!!!"
    #   env: 
    #     - "OMP_NUM_THREADS={ncpus}"
    #     - "OPENBLAS_NUM_THREADS={ncpus}"
    #     - "GOTO_NUM_THREADS={ncpus}"


leonardo:
  scheduler: slurm

  default_conf:
    account: "IscrC_OMG-25_0"
    time: "00:30:00"
    partition: "dcgp_usr_prod"
    qos: "normal"
    exclusive: true
    nodes: 1
    ntasks: 1
    custom_headers:
      - "#SBATCH --gres=gres/tmpfs:10g"
    env: 
      - "OMP_PROC_BIND=close"
      - "OMP_PLACES=cores"

  configs:

    - name: "dcgp__gcc____{ncpus}"
      cpus_per_task: "{ncpus}"
      modules: 
        - "gcc/12.2.0"
      env:
        - "OMP_NUM_THREADS={ncpus}"

    - name: "dcgp__gcc__openblas__{ncpus}"
      cpus_per_task: "{ncpus}"
      modules: 
        - "gcc/12.2.0"
        - "openblas/0.3.26--gcc--12.2.0"
      env:
        - "OMP_NUM_THREADS={ncpus}"
        - "OPENBLAS_NUM_THREADS={ncpus}"
        - "GOTO_NUM_THREADS={ncpus}"


    - name: "dcgp__clang____{ncpus}"
      cpus_per_task: "{ncpus}"
      modules: 
        - "llvm/14.0.6--gcc--12.2.0-cuda-12.2"
      env:
        - "OMP_NUM_THREADS={ncpus}"
        - "OPENBLAS_NUM_THREADS={ncpus}"
        - "GOTO_NUM_THREADS={ncpus}"

    # No OpenBLAS-clang available


    - name: "dcgp__icx____{ncpus}"
      cpus_per_task: "{ncpus}"
      modules: 
        - "intel-oneapi-compilers/2024.1.0"
      env:
        - "OMP_NUM_THREADS={ncpus}"
        - "MKL_NUM_THREADS={ncpus}"

    - name: "dcgp__icx__mkl__{ncpus}"
      cpus_per_task: "{ncpus}"
      modules: 
        - "intel-oneapi-compilers/2024.1.0"
        - "intel-oneapi-mkl/2024.0.0"
      env:
        - "OMP_NUM_THREADS={ncpus}"
        - "MKL_NUM_THREADS={ncpus}"


