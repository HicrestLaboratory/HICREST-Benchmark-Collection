bsc-hca-pioneer:
  scheduler: slurm

  default_conf:
    partition: "pioneer"
    nodes: 1
    ntasks: 1
    exclusive: true
    time: "02:00:00"
    env: 
      - "OMP_PROC_BIND=close"
      - "OMP_PLACES=cores"
    extra_headers:
      - "source /etc/profile.d/modules.sh"

  configs:
    - name: "compile__gcc__"
      cpus_per_task: 64

    - name: "compile__clang__"
      cpus_per_task: 64
      env:
        - "PATH=$PATH:/apps/riscv/llvm/EPI-0.7/development/bin" # WORKAROUND modules do not work in sbatch scripts
        - "LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/apps/riscv/llvm/EPI-0.7/development/lib"

