include_variables: "shared_memory_vars.yaml"

# Local testing
local:
  scheduler: local

  default_conf:
    env: 
      - "OMP_PROC_BIND=close"
      - "OMP_PLACES=cores"

  configs:
    - name: "{compiler}__{compiler_opt}__{compiler_extra_flags_name}__"
      env:
        - "CC={compiler_c[compiler]}"
        - "CXX={compiler_cxx[compiler]}"
        - 'CFLAGS="{compiler_opt} {compiler_common} {compiler_march} {compiler_extra_flags[compiler_extra_flags_name]}"'
        - "CLINK="

# BananaPiF3 @ Dalek
dalek-mono-bpi-f3: 
  scheduler: slurm

  default_conf:
    exclusive: true
    partition: "mono"
    nodelist: "mono-bpi-f3"
    env: 
      - "OMP_PROC_BIND=close"
      - "OMP_PLACES=cores"
    modules:
      - "ncm/1.1.2"
      # TODO uniform compiler versions

  configs:
    - name: "{compiler}__{compiler_opt}__{compiler_extra_flags_name}____{ncpus}"
      env:
        - "CC={compiler_c[compiler]}"
        - "CXX={compiler_cxx[compiler]}"
        - 'CFLAGS="{compiler_opt} {compiler_common} {compiler_march} {compiler_extra_flags[compiler_extra_flags_name]}"'
        - "CLINK="
        - "OMP_NUM_THREADS={ncpus}"
      custom_headers:
        - "source /etc/profile.d/modules.sh"
        - "--cpus-per-task={ncpus}"
      



